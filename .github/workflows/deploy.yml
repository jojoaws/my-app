name: Deploy to ECS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{secrets.AWS_REGION }} | docker login --username AWS --password-stdin  ${{ secrets.ACCOUND_ID }}.dkr.ecr.${{ secrets.AWS_REGION}}.amazonaws.com

      - name: Build web image
        run: docker build -t web .

      - name: Build worker image
        run: docker build -f Dockerfile.worker -t worker .

      - name: Tag & push web
        run: |
          docker tag web:latest  ${{ secrets.ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/web:latest
          docker push   ${{ secrets.ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/web:latest

      - name: Tag & push worker
        run: |
          docker tag worker:latest  ${{ secrets.ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/worker:latest
          docker push ${{ secrets.ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/worker:latest
